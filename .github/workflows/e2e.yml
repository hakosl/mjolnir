name: E2E Smoke Test

on:
  workflow_dispatch:

jobs:
  e2e:
    name: E2E Smoke Test (OCI)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo -e "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Run E2E smoke test
        env:
          E2E_TIMEOUT: "600"
        run: bash tests/e2e/run_e2e.sh

      - name: Collect logs on failure
        if: failure()
        run: |
          ssh opc@100.106.150.47 "cat /home/opc/mjolnir/workspace/e2e-smoke/e2e.log 2>/dev/null" > e2e.log || true
          ssh opc@100.106.150.47 "cat /home/opc/mjolnir/workspace/e2e-smoke/state.json 2>/dev/null" > state.json || true
          ssh opc@100.106.150.47 "cat /home/opc/mjolnir/workspace/e2e-smoke/sprints/01/eval_report.json 2>/dev/null" > eval_report.json || true

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            e2e.log
            state.json
            eval_report.json

      - name: Cleanup
        if: always()
        run: bash tests/e2e/run_e2e.sh --cleanup || true
