name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check lib/ tests/
      - run: ruff format --check lib/ tests/

  lint-bash:
    name: Lint Bash
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y shellcheck
      - run: shellcheck mjolnir.sh mjolnir-watchdog.sh mjolnir tests/test_cli.sh tests/test_orchestration.sh tests/e2e/run_e2e.sh

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install tomli
      - run: python3 tests/test_parse_stream.py
      - run: python3 tests/test_state.py
      - run: python3 tests/test_notify.py

  test-cli:
    name: CLI Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install tomli
      - run: bash tests/test_cli.sh

  test-orchestration:
    name: Orchestration Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install tomli
      - run: bash tests/test_orchestration.sh
